<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Solutions</title>
    <link rel="stylesheet" href="web-styles.css">
    <style>
        html, body {
            margin: 0;
            min-height: 100%;
        }
        body {
            min-height: 100vh;
            background-color: #1a0a05;
            background-image: url('images/fire-theme.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        @media (max-width: 768px) {
            body {
                background-attachment: scroll;
            }
        }
        .fire-page {
            max-width: 1100px;
            margin: 0 auto;
            padding: clamp(5rem, 12vw, 7rem) 1.5rem 3rem;
        }
        .fire-images {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            align-items: start;
        }
        @media (max-width: 700px) {
            .fire-images {
                grid-template-columns: 1fr;
            }
        }
        .fire-images img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 14px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
            object-fit: cover;
        }
        .fire-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            color: #fff;
            text-decoration: none;
            font-size: 0.95rem;
            opacity: 0.9;
        }
        .fire-back:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <main class="fire-page">
        <a href="index.html" class="fire-back">← Back to main</a>
        <div class="fire-images">
            <img src="images/fire-image-1.jpeg" alt="Robur Fire Solutions" decoding="async">
            <img src="images/fire-image-2.jpeg" alt="Robur Fire Solutions" decoding="async">
        </div>
    </main>
</body>
</html>
